<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VisionOS Clinic Display</title>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0; overflow: hidden;
            background: #05050A;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }

        .liquid-bg { position: fixed; inset: 0; z-index: -1; filter: blur(90px); overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; mix-blend-mode: hard-light; }
        .blob-1 { width: 70vw; height: 70vw; background: rgba(10, 132, 255, 0.6); top: -10%; left: -10%; animation: float1 25s infinite alternate ease-in-out; }
        .blob-2 { width: 60vw; height: 60vw; background: rgba(94, 92, 230, 0.5); bottom: -20%; right: -10%; animation: float2 30s infinite alternate ease-in-out; }
        .blob-3 { width: 50vw; height: 50vw; background: rgba(50, 215, 75, 0.3); top: 40%; left: 30%; animation: float3 20s infinite alternate ease-in-out; }

        @keyframes float1 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(20vw, 20vh) scale(1.1); } }
        @keyframes float2 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-20vw, -15vh) scale(1.2); } }
        @keyframes float3 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-10vw, 20vh) scale(0.9); } }

        .glass-container {
            width: 94vw; height: 90vh;
            background: rgba(20, 20, 25, 0.35); border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(50px) saturate(180%); -webkit-backdrop-filter: blur(50px) saturate(180%);
            box-shadow: 0 40px 80px rgba(0,0,0,0.4), inset 0 2px 0 rgba(255,255,255,0.15);
            border-radius: 44px; display: flex; flex-direction: row; box-sizing: border-box;
            overflow: hidden;
        }

        /* MAIN DOCTOR QUEUE PANEL */
        .main-panel {
            flex: 1; padding: 50px 60px; display: flex; flex-direction: column; justify-content: space-between;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        /* RIGHT LAB QUEUE PANEL */
        .lab-panel {
            width: 360px; padding: 50px 30px; display: flex; flex-direction: column;
            background: rgba(0,0,0,0.1);
        }

        .header-row, .footer-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .footer-row { align-items: flex-end; }

        .badge {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 24px; border-radius: 24px; display: inline-flex; flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); align-items: flex-start;
        }
        .badge-label { font-size: 13px; font-weight: 800; color: rgba(255,255,255,0.5); letter-spacing: 0.15em; margin-bottom: 6px; }
        .badge-value { font-size: 26px; font-weight: 600; color: white; letter-spacing: -0.02em; }

        .clock { font-size: 32px; font-weight: 500; padding: 12px 28px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }

        .prompt-text { font-size: 1.6vw; color: #0A84FF; text-transform: uppercase; letter-spacing: 0.25em; font-weight: 800; margin-bottom: 12px; text-shadow: 0 4px 12px rgba(10,132,255,0.4); text-align: center; }
        .current-patient { font-size: min(8vw, 110px); font-weight: 800; line-height: 1.1; margin: auto; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60vw; transition: opacity 0.3s ease; }
        
        /* Links style */
        a.clickable-name { color: white; text-decoration: none; display:block; background: linear-gradient(135deg, #FFF 0%, #A0A0A5 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); transition: filter 0.2s; }
        a.clickable-name:hover { filter: drop-shadow(0 12px 24px rgba(10,132,255,0.6)); cursor: pointer;}
        a.clickable-upcoming { color: white; text-decoration: none; }
        a.clickable-upcoming:hover { color: #0A84FF; text-decoration: underline; }

        .glass-btn {
            background: linear-gradient(135deg, rgba(10, 132, 255, 0.3), rgba(94, 92, 230, 0.3)); border: 1px solid rgba(10, 132, 255, 0.4);
            color: white; font-size: 24px; font-weight: 700; padding: 24px 44px; border-radius: 50px; cursor: pointer;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 16px;
        }
        .glass-btn:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(10, 132, 255, 0.4); background: linear-gradient(135deg, rgba(10, 132, 255, 0.45), rgba(94, 92, 230, 0.45)); }
        
        /* LAB STYLES */
        .lab-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; overflow: hidden; }
        .lab-item:hover { background: rgba(100,210,255,0.15); border-color: #64D2FF; transform: scale(1.02); }
        .lab-name { font-size: 18px; font-weight: 600; color: white; text-decoration: none; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 15px; }
        .lab-name:hover { color: #64D2FF; }
        
        .lab-done-btn {
            background: rgba(48,209,88,0.2); border: 1px solid #30D158; color: #30D158;
            width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; transition: all 0.2s;
        }
        .lab-done-btn:hover { transform: scale(1.15); background: #30D158; color: white; box-shadow: 0 5px 15px rgba(48,209,88,0.4);}
        
        /* Custom Scrollbar for Labs */
        #labList { overflow-y: auto; padding-right: 5px; height: 100%; margin-top:20px; }
        #labList::-webkit-scrollbar { width: 6px; }
        #labList::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px;}
        #labList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    </div>

    <div class="glass-container">
        
        <!-- LEFT PANEL: DOCTOR QUEUE -->
        <div class="main-panel">
            <div class="header-row">
                <div class="badge">
                    <span class="badge-label">PREVIOUS</span>
                    <span class="badge-value" id="prevPatientName">None</span>
                </div>
                <div class="clock" id="clock">--:--</div>
            </div>

            <div style="text-align: center;">
                <h2 class="prompt-text" id="statusPrompt">Please proceed to Doctor</h2>
                <h1 class="current-patient" id="currentPatientContainer">Loading...</h1>
            </div>

            <div class="footer-row">
                <div class="badge" id="upcomingBox" style="opacity: 0.8; visibility: hidden;">
                    <span class="badge-label">UPCOMING</span>
                    <span class="badge-value" id="upcomingPatientName">--</span>
                    <span style="font-size:14px; color:rgba(255,255,255,0.6); margin-top:8px; font-weight: 500;" id="qCountText">+ 0 more waiting</span>
                </div>
                <button id="actionBtn" class="glass-btn" onclick="callNext()">
                    <span style="font-size:32px; transform: translateY(-2px);">➜</span> Finish & Call
                </button>
            </div>
        </div>

        <!-- RIGHT PANEL: LAB QUEUE -->
        <div class="lab-panel">
            <h3 style="margin: 0; color: #64D2FF; letter-spacing: 2px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 24px; text-transform: uppercase;">🧪 Labs Waiting (<span id="labCount">0</span>)</h3>
            <div id="labList">
                <!-- Javascript Injection -->
            </div>
        </div>

    </div>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyBmQlAnDbaVeZOz1lZbRsH-NyJ7TgTfBPU",
        authDomain: "saad-clinic.firebaseapp.com",
        databaseURL: "https://saad-clinic-default-rtdb.firebaseio.com",
        projectId: "saad-clinic"
    });
    const db = firebase.database();

    let completeQueue = [];
    let labQueue = [];
    let previousPatientName = "None";
    let currentlySpeakingId = null;
    let isProcessing = false;

    // Background Auth (in case it's needed)
    if(firebase.auth) { firebase.auth().signInAnonymously().catch(e => console.log('Auth check bypass.')); }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
    document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    db.ref('patientIndex').on('value', (snap) => {
        let pts = snap.val() || {};
        let q = [];
        let lQueue = [];
        
        for (let id in pts) {
            let pName = pts[id].name || "";
            let pTime = pts[id].queueTime || 0;
            
            // Check for the lab emoji
            if (pName.includes('🧪')) {
                lQueue.push({ id: id, name: pName, time: pTime });
            } 
            // Normal waitlist 
            else if (pts[id].isWaiting) {
                q.push({ id: id, name: pName, time: pTime });
            }
        }
        
        q.sort((a, b) => a.time - b.time);
        lQueue.sort((a, b) => a.time - b.time); // Oldest labs first
        
        completeQueue = q;
        labQueue = lQueue;
        updateScreen();
    });

    function updateScreen() {
        // --- DOCTOR QUEUE UPDATE ---
        document.getElementById('prevPatientName').innerText = previousPatientName;

        if (completeQueue.length > 0) {
            let currentPt = completeQueue[0];
            currentlySpeakingId = currentPt.id;

            // Make the massive name a clickable deep-link!
            document.getElementById('currentPatientContainer').innerHTML = `<a href="index.html?patientId=${currentPt.id}" target="_blank" class="clickable-name">${currentPt.name}</a>`;
            
            document.getElementById('statusPrompt').innerText = "Doctor is ready for";
            document.getElementById('actionBtn').style.display = 'inline-flex';

            if (completeQueue.length > 1) {
                document.getElementById('upcomingBox').style.visibility = 'visible';
                // Make upcoming name a clickable deep-link too!
                document.getElementById('upcomingPatientName').innerHTML = `<a href="index.html?patientId=${completeQueue[1].id}" target="_blank" class="clickable-upcoming">${completeQueue[1].name}</a>`;
                
                let extra = completeQueue.length - 2;
                document.getElementById('qCountText').style.display = (extra > 0) ? 'block' : 'none';
                document.getElementById('qCountText').innerText = "+ " + extra + " more in lobby";
            } else {
                document.getElementById('upcomingBox').style.visibility = 'hidden';
            }
        } else {
            currentlySpeakingId = null;
            document.getElementById('currentPatientContainer').innerText = "Clinic Empty";
            document.getElementById('statusPrompt').innerText = "No patients are waiting";
            document.getElementById('actionBtn').style.display = 'none';
            document.getElementById('upcomingBox').style.visibility = 'hidden';
        }

        // --- LAB QUEUE UPDATE ---
        document.getElementById('labCount').innerText = labQueue.length;
        let labHtml = '';
        if(labQueue.length === 0) {
            labHtml = '<p style="color:rgba(255,255,255,0.4); text-align:center; margin-top:40px; font-weight:500;">No labs currently tracking.</p>';
        } else {
            labQueue.forEach(lab => {
                labHtml += `
                    <div class="lab-item">
                        <a href="index.html?patientId=${lab.id}" target="_blank" class="lab-name">${lab.name}</a>
                        <button class="lab-done-btn" onclick="markLabDone('${lab.id}', '${lab.name.replace(/'/g, "\\'")}')" title="Mark Done">✓</button>
                    </div>
                `;
            });
        }
        document.getElementById('labList').innerHTML = labHtml;
    }

    function callNext() {
        if (!currentlySpeakingId || isProcessing) return;
        isProcessing = true;
        previousPatientName = completeQueue[0].name;
        db.ref('patientIndex/' + currentlySpeakingId).update({ isWaiting: false }).then(() => {
            setTimeout(() => { isProcessing = false; }, 600); 
        });
    }

    function markLabDone(patientId, currentName) {
        // Strip out the exact lab emoji when the checkmark is pressed!
        let newName = currentName.replace(/🧪/g, '').trim();
        db.ref('patientIndex/' + patientId).update({ name: newName });
    }
        firebase.initializeApp({
        apiKey: "AIzaSyBmQlAnDbaVeZOz1lZbRsH-NyJ7TgTfBPU",
        authDomain: "saad-clinic.firebaseapp.com",
        databaseURL: "https://saad-clinic-default-rtdb.firebaseio.com",
        projectId: "saad-clinic"
    });
    const db = firebase.database();

    function parseDate(d) {
        if(!d || d==="N/A") return 0;
        if(d.includes('/')){
            var p = d.split('/');
            if(p.length === 3) return new Date(+p[2], p[1]-1, +p[0]).getTime();
        }
        var v = new Date(d).getTime();
        return isNaN(v) ? 0 : v;
    }

    let completeQueue = [];
    let labQueue = [];
    let lastSeenQueue = []; // Memory buffer for iPad
    let previousPatientName = "None";
    let currentlySpeakingId = null;
    let isProcessing = false;

    // Background Auth hook
    if(firebase.auth) { firebase.auth().signInAnonymously().catch(e => console.log('Auth pass.')); }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
    document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    db.ref('patientIndex').on('value', (snap) => {
        let pts = snap.val() || {};
        let q = [];
        let lQueue = [];
        let now = Date.now();
        
        for (let id in pts) {
            let pName = pts[id].name || "";
            let pTime = pts[id].queueTime || 0;
            
            // Check for lab emoji (Filtered to ensure they visited today to prevent old ghost patients)
            let dtTs = Math.max(parseDate(pts[id].dateAdded), parseDate(pts[id].lastVisit));
            let isRecent = (now - dtTs) < (1000 * 60 * 60 * 24); // Within 24 hours

            if (pName.includes('🧪') && isRecent) {
                lQueue.push({ id: id, name: pName, time: pTime });
            } 
            // Normal waitlist
            else if (pts[id].isWaiting && !pName.includes('🧪')) {
                q.push({ id: id, name: pName, time: pTime });
            }
        }
        
        q.sort((a, b) => a.time - b.time);
        lQueue.sort((a, b) => a.time - b.time); 
        
        // 🔹 UNIVERSAL "PREVIOUS PATIENT" FIX
        // Automatically detect if the #1 person drops out of the waiting list from the main computer
        if (lastSeenQueue.length > 0 && q.length > 0) {
            if (lastSeenQueue[0].id !== q[0].id) {
                if (!pts[lastSeenQueue[0].id] || !pts[lastSeenQueue[0].id].isWaiting) {
                     previousPatientName = lastSeenQueue[0].name;
                }
            }
        } else if (lastSeenQueue.length > 0 && q.length === 0) {
             previousPatientName = lastSeenQueue[0].name;
        }

        lastSeenQueue = q;
        completeQueue = q;
        labQueue = lQueue;
        updateScreen();
    });

    function updateScreen() {
        // --- DOCTOR QUEUE UPDATE ---
        document.getElementById('prevPatientName').innerText = previousPatientName;

        if (completeQueue.length > 0) {
            let currentPt = completeQueue[0];
            currentlySpeakingId = currentPt.id;
            
            document.getElementById('currentPatientContainer').innerHTML = `<a href="index.html?patientId=${currentPt.id}" target="_blank" class="clickable-name">${currentPt.name}</a>`;
            document.getElementById('statusPrompt').innerText = "Doctor is ready for";
            document.getElementById('actionBtn').style.display = 'inline-flex';

            if (completeQueue.length > 1) {
                document.getElementById('upcomingBox').style.visibility = 'visible';
                document.getElementById('upcomingPatientName').innerHTML = `<a href="index.html?patientId=${completeQueue[1].id}" target="_blank" class="clickable-upcoming">${completeQueue[1].name}</a>`;
                let extra = completeQueue.length - 2;
                document.getElementById('qCountText').style.display = (extra > 0) ? 'block' : 'none';
                document.getElementById('qCountText').innerText = "+ " + extra + " more in lobby";
            } else { document.getElementById('upcomingBox').style.visibility = 'hidden'; }
        } else {
            currentlySpeakingId = null;
            document.getElementById('currentPatientContainer').innerText = "Clinic Empty";
            document.getElementById('statusPrompt').innerText = "No patients are waiting";
            document.getElementById('actionBtn').style.display = 'none';
            document.getElementById('upcomingBox').style.visibility = 'hidden';
        }

        // --- LAB QUEUE UPDATE (PURE NAMES AS REQUESTED) ---
        document.getElementById('labCount').innerText = labQueue.length;
        let labHtml = '';
        if(labQueue.length === 0) {
            labHtml = '<p style="color:rgba(255,255,255,0.4); text-align:center; margin-top:40px; font-weight:500;">No labs currently tracking.</p>';
        } else {
            labQueue.forEach(lab => {
                labHtml += `
                    <div class="lab-item" style="justify-content: center; text-align: center; padding: 24px;">
                        <a href="index.html?patientId=${lab.id}" target="_blank" class="lab-name" style="margin: 0; font-size: 20px; display: block; width: 100%;">${lab.name}</a>
                    </div>
                `;
            });
        }
        document.getElementById('labList').innerHTML = labHtml;
    }

    function callNext() {
        if (!currentlySpeakingId || isProcessing) return;
        isProcessing = true;
        previousPatientName = completeQueue[0].name;
        db.ref('patientIndex/' + currentlySpeakingId).update({ isWaiting: false }).then(() => {
            setTimeout(() => { isProcessing = false; }, 600); 
        });
    }

</script>
</body>
</html>
